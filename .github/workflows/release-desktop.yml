name: Release Desktop App
permissions:
    contents: write
    
on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:


jobs:
  build-and-release:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: aarch64
            target: aarch64-apple-darwin
          - os: macos-latest
            arch: x86_64
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app/desktop/ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/desktop/tauri
          # The cache key is built based on the runner OS and the hash of Cargo.lock
          # Enabling cache-all-crates ensures that all crates are cached, not just the ones in the workspace
          cache-all-crates: "true"
          # Shared key to allow sharing cache between jobs if needed (though matrix jobs are separate)
          shared-key: "desktop-build"

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: 3.11
          activate-environment: sage-desktop-env
          auto-activate-base: false
          architecture: ${{ matrix.arch == 'x86_64' && 'x64' || 'arm64' }}
          channels: conda-forge,defaults
          channel-priority: flexible

      - name: Install System Dependencies
        run: |
          brew install create-dmg

      - name: Build Application
        shell: bash -l {0}
        env:
          PIP_INDEX_URL: https://pypi.org/simple
        run: |
          chmod +x app/desktop/scripts/build.sh
          chmod +x app/desktop/scripts/generate_cert.sh
          
          # The script detects OS/Arch automatically
          app/desktop/scripts/build.sh release

      - name: Rename Artifacts
        run: |
          # Rename dmg to include arch and version to avoid conflicts in release
          # Extract version from tag (e.g., desktop-v0.1.0 -> 0.1.0)
          VERSION="${GITHUB_REF#refs/tags/desktop-v}"
          
          cd app/desktop/tauri/target/release/bundle/dmg/
          for file in *.dmg; do
            mv "$file" "SageAI-${VERSION}-${{ matrix.arch }}.dmg"
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SageAI-macOS-${{ matrix.arch }}
          path: app/desktop/tauri/target/release/bundle/dmg/*.dmg

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app/desktop/tauri/target/release/bundle/dmg/*.dmg
          draft: true
          prerelease: true
