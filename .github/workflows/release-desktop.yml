name: Release Desktop App
permissions:
  contents: write

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  prepare_macos_aarch64:
    name: Prepare deps (macOS arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Dependencies
        uses: ./.github/actions/desktop-prepare-deps
        with:
          node_arch: arm64
          platform: macos
          deps_artifact: desktop-deps-macos-aarch64

  prepare_macos_x86_64:
    name: Prepare deps (macOS x86_64)
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Dependencies
        uses: ./.github/actions/desktop-prepare-deps
        with:
          node_arch: x64
          platform: macos
          deps_artifact: desktop-deps-macos-x86_64

  prepare_linux_x86_64:
    name: Prepare deps (Linux x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Dependencies
        uses: ./.github/actions/desktop-prepare-deps
        with:
          node_arch: x64
          platform: linux
          deps_artifact: desktop-deps-linux-x86_64

  prepare_linux_aarch64:
    name: Prepare deps (Linux aarch64)
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Dependencies
        uses: ./.github/actions/desktop-prepare-deps
        with:
          node_arch: arm64
          platform: linux
          deps_artifact: desktop-deps-linux-aarch64

  prepare_windows_x86_64:
    name: Prepare deps (Windows x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Dependencies
        uses: ./.github/actions/desktop-prepare-deps
        with:
          node_arch: x64
          platform: windows
          deps_artifact: desktop-deps-windows-x86_64

  build_macos_aarch64:
    name: Build & Release (macOS arm64)
    needs: prepare_macos_aarch64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Build Environment
        uses: ./.github/actions/desktop-build-setup
        with:
          node_arch: arm64
          rust_target: aarch64-apple-darwin
          deps_artifact: desktop-deps-macos-aarch64
          pip_cache_path: |
            ~/.cache/pip
            ~/Library/Caches/pip

      - name: Install System Dependencies
        shell: bash
        run: |
          chmod +x app/desktop/scripts/github/install_system_deps.sh
          app/desktop/scripts/github/install_system_deps.sh macos

      - name: Build Application
        shell: bash -l {0}
        env:
          PIP_INDEX_URL: https://pypi.org/simple
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          chmod +x app/desktop/scripts/github/build.sh
          chmod +x app/desktop/scripts/generate_cert.sh
          app/desktop/scripts/github/build.sh release

      - name: Normalize Updater Artifact Name
        shell: bash
        run: |
          chmod +x app/desktop/scripts/github/rename_macos_updater.sh
          app/desktop/scripts/github/rename_macos_updater.sh aarch64

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            app/desktop/tauri/target/release/bundle/dmg/*.dmg
            app/desktop/tauri/target/release/bundle/macos/*.app.tar.gz
            app/desktop/tauri/target/release/bundle/macos/*.app.tar.gz.sig

  build_macos_x86_64:
    name: Build & Release (macOS x86_64)
    needs: prepare_macos_x86_64
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Build Environment
        uses: ./.github/actions/desktop-build-setup
        with:
          node_arch: x64
          rust_target: x86_64-apple-darwin
          deps_artifact: desktop-deps-macos-x86_64
          pip_cache_path: |
            ~/.cache/pip
            ~/Library/Caches/pip

      - name: Install System Dependencies
        shell: bash
        run: |
          chmod +x app/desktop/scripts/github/install_system_deps.sh
          app/desktop/scripts/github/install_system_deps.sh macos

      - name: Build Application
        shell: bash -l {0}
        env:
          PIP_INDEX_URL: https://pypi.org/simple
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          chmod +x app/desktop/scripts/github/build.sh
          chmod +x app/desktop/scripts/generate_cert.sh
          app/desktop/scripts/github/build.sh release

      - name: Normalize Updater Artifact Name
        shell: bash
        run: |
          chmod +x app/desktop/scripts/github/rename_macos_updater.sh
          app/desktop/scripts/github/rename_macos_updater.sh x86_64

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            app/desktop/tauri/target/release/bundle/dmg/*.dmg
            app/desktop/tauri/target/release/bundle/macos/*.app.tar.gz
            app/desktop/tauri/target/release/bundle/macos/*.app.tar.gz.sig

  build_linux_x86_64:
    name: Build & Release (Linux x86_64)
    needs: prepare_linux_x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Build Environment
        uses: ./.github/actions/desktop-build-setup
        with:
          node_arch: x64
          rust_target: x86_64-unknown-linux-gnu
          deps_artifact: desktop-deps-linux-x86_64
          pip_cache_path: ~/.cache/pip

      - name: Install System Dependencies
        shell: bash
        run: |
          chmod +x app/desktop/scripts/github/install_system_deps.sh
          app/desktop/scripts/github/install_system_deps.sh linux

      - name: Build Application
        shell: bash -l {0}
        env:
          PIP_INDEX_URL: https://pypi.org/simple
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          chmod +x app/desktop/scripts/github/build.sh
          app/desktop/scripts/github/build.sh release

      - name: Collect And Rename Artifacts
        shell: bash
        run: |
          chmod +x app/desktop/scripts/github/collect_and_rename_linux_deb.sh
          app/desktop/scripts/github/collect_and_rename_linux_deb.sh x86_64 app/desktop/tauri/target/release/bundle/deb

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release-assets/linux/*.deb

  build_linux_aarch64:
    name: Build & Release (Linux aarch64)
    needs: prepare_linux_aarch64
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Build Environment
        uses: ./.github/actions/desktop-build-setup
        with:
          node_arch: arm64
          rust_target: aarch64-unknown-linux-gnu
          deps_artifact: desktop-deps-linux-aarch64
          pip_cache_path: ~/.cache/pip

      - name: Install System Dependencies
        shell: bash
        run: |
          chmod +x app/desktop/scripts/github/install_system_deps.sh
          app/desktop/scripts/github/install_system_deps.sh linux

      - name: Build Application
        shell: bash -l {0}
        env:
          PIP_INDEX_URL: https://pypi.org/simple
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          chmod +x app/desktop/scripts/github/build.sh
          app/desktop/scripts/github/build.sh release

      - name: Collect And Rename Artifacts
        shell: bash
        run: |
          chmod +x app/desktop/scripts/github/collect_and_rename_linux_deb.sh
          app/desktop/scripts/github/collect_and_rename_linux_deb.sh aarch64 app/desktop/tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release-assets/linux/*.deb

  build_windows_x86_64:
    name: Build & Release (Windows x86_64)
    needs: prepare_windows_x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Build Environment
        uses: ./.github/actions/desktop-build-setup
        with:
          node_arch: x64
          rust_target: x86_64-pc-windows-msvc
          deps_artifact: desktop-deps-windows-x86_64
          pip_cache_path: ~\AppData\Local\pip\Cache

      - name: Build Application
        shell: pwsh
        env:
          PIP_INDEX_URL: https://pypi.org/simple
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          ./app/desktop/scripts/github/build_windows.ps1 release

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            app/desktop/tauri/target/release/bundle/nsis/*.exe
            app/desktop/tauri/target/release/bundle/nsis/*.zip
            app/desktop/tauri/target/release/bundle/nsis/*.zip.sig
            app/desktop/tauri/target/release/bundle/msi/*.msi
            app/desktop/tauri/target/release/bundle/msi/*.zip
            app/desktop/tauri/target/release/bundle/msi/*.zip.sig
