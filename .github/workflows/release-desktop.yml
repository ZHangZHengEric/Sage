name: Release Desktop App
permissions:
    contents: write
    
on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:


jobs:
  build-and-release:
    name: Build & Release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            platform: macos
            arch: aarch64
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            platform: macos
            arch: x86_64
            target: x86_64-apple-darwin
          - runner: ubuntu-22.04
            platform: linux
            arch: x86_64
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-22.04-arm
            platform: linux
            arch: aarch64
            target: aarch64-unknown-linux-gnu
          - runner: windows-latest
            platform: windows
            arch: x86_64
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          architecture: ${{ matrix.arch == 'x86_64' && 'x64' || 'arm64' }}
          cache: 'npm'
          cache-dependency-path: app/desktop/ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/desktop/tauri
          # The cache key is built based on the runner OS and the hash of Cargo.lock
          # Enabling cache-all-crates ensures that all crates are cached, not just the ones in the workspace
          cache-all-crates: "true"
          # Shared key to allow sharing cache between jobs if needed (though matrix jobs are separate)
          shared-key: "desktop-build"

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: 3.11
          activate-environment: sage-desktop-env
          auto-activate-base: false
          architecture: ${{ matrix.arch == 'x86_64' && 'x64' || 'arm64' }}
          channels: conda-forge,defaults
          channel-priority: flexible

      - name: Sync Tauri Version From Tag
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/desktop-v}"
          echo "Syncing Tauri version to ${VERSION}"
          TAURI_VERSION="$VERSION" node - <<'EOF'
          const fs = require('fs');
          const configPath = 'app/desktop/tauri/tauri.conf.json';
          const version = process.env.TAURI_VERSION;
          const config = JSON.parse(fs.readFileSync(configPath, 'utf8'));
          config.version = version;
          fs.writeFileSync(configPath, JSON.stringify(config, null, 2) + '\n');
          EOF

      - name: Cache Python Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/Library/Caches/pip
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('app/desktop/core/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install System Dependencies
        if: matrix.platform == 'macos'
        run: |
          brew install create-dmg

      - name: Install System Dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libssl-dev \
            libglib2.0-dev
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev
          sudo apt-get install -y libappindicator3-dev || sudo apt-get install -y libayatana-appindicator3-dev

      - name: Build Application (macOS)
        if: matrix.platform == 'macos'
        shell: bash -l {0}
        env:
          PIP_INDEX_URL: https://pypi.org/simple
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          chmod +x app/desktop/scripts/build.sh
          chmod +x app/desktop/scripts/generate_cert.sh
          app/desktop/scripts/build.sh release

      - name: Build Application (Linux)
        if: matrix.platform == 'linux'
        shell: bash -l {0}
        env:
          PIP_INDEX_URL: https://pypi.org/simple
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          chmod +x app/desktop/scripts/build.sh
          app/desktop/scripts/build.sh release

      - name: Build Application (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          PIP_INDEX_URL: https://pypi.org/simple
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          ./app/desktop/scripts/build_windows.ps1 release

      - name: Normalize Updater Artifact Name (macOS)
        if: matrix.platform == 'macos'
        run: |
          VERSION="${GITHUB_REF#refs/tags/desktop-v}"
          TARGET_DIR="app/desktop/tauri/target/release/bundle/macos"
          TARGET_NAME="Sage_${VERSION}_${{ matrix.arch }}.app.tar.gz"

          shopt -s nullglob
          cd "$TARGET_DIR"
          for file in *.tar.gz; do
            if [ "$file" != "$TARGET_NAME" ]; then
              mv "$file" "$TARGET_NAME"
            fi
          done
          for file in *.tar.gz.sig; do
            if [ "$file" != "${TARGET_NAME}.sig" ]; then
              mv "$file" "${TARGET_NAME}.sig"
            fi
          done

      - name: Release (macOS)
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'macos'
        with:
          files: |
            app/desktop/tauri/target/release/bundle/dmg/*.dmg
            app/desktop/tauri/target/release/bundle/macos/*.app.tar.gz
            app/desktop/tauri/target/release/bundle/macos/*.app.tar.gz.sig

      - name: Release (Windows)
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'windows'
        with:
          files: |
            app/desktop/tauri/target/release/bundle/nsis/*.exe
            app/desktop/tauri/target/release/bundle/nsis/*.zip
            app/desktop/tauri/target/release/bundle/nsis/*.zip.sig
            app/desktop/tauri/target/release/bundle/msi/*.msi
            app/desktop/tauri/target/release/bundle/msi/*.zip
            app/desktop/tauri/target/release/bundle/msi/*.zip.sig

      - name: Collect Linux Release Assets
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            DEB_DIR="app/desktop/tauri/target/${{ matrix.target }}/release/bundle/deb"
          else
            DEB_DIR="app/desktop/tauri/target/release/bundle/deb"
          fi

          mkdir -p release-assets/linux
          cp "$DEB_DIR"/*.deb release-assets/linux/

      - name: Rename Artifacts (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/desktop-v}"
          for file in release-assets/linux/*.deb; do
            mv "$file" "release-assets/linux/Sage_${VERSION}_${{ matrix.arch }}.deb"
          done

      - name: Release (Linux)
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'linux'
        with:
          files: |
            release-assets/linux/*.deb
