services:
  sage-wiki:
    restart: always
    build:
      context: ${SAGE_REPO_ROOT:-../..}
      dockerfile: deploy/images/Dockerfile.wiki
      args:
        NGINX_CONF: deploy/nginx/nginx_wiki.conf
    image: sage-wiki:v1.0
    container_name: ${SAGE_CONTAINER_PREFIX:-sage}-wiki
    ports:
      - ${SAGE_WIKI_PORT:-30057}:80
    environment:
      TZ: 'Asia/Shanghai'
    mem_limit: 512m
    cpus: 0.5

  sage-rustfs:
    image: docker.m.daocloud.io/rustfs/rustfs:latest
    ports:
      - ${SAGE_RUSTFS_API_PORT:-30054}:9000
      - ${SAGE_RUSTFS_CONSOLE_PORT:-30055}:9001
    volumes:
      - ${SAGE_ROOT}/rustfs/data:/data
    container_name: ${SAGE_CONTAINER_PREFIX:-sage}-rustfs
    restart: always
    environment:
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_ACCESS_KEY=${SAGE_S3_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${SAGE_S3_SECRET_KEY}
      - RUSTFS_OBS_LOGGER_LEVEL=info
    healthcheck:
      test:
        [
          "CMD",
          "sh", "-c",
          "curl -f http://127.0.0.1:9000/health && curl -f http://127.0.0.1:9001/rustfs/console/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 1g
    cpus: 0.5

  sage-redis:
    image: docker.m.daocloud.io/redis:7-alpine
    restart: unless-stopped
    container_name: ${SAGE_CONTAINER_PREFIX:-sage}-redis
    command:
      [
        "sh",
        "-c",
        "if [ -n \"$$REDIS_PASSWORD\" ]; then exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\"; else exec redis-server --appendonly yes; fi",
      ]
    environment:
      TZ: Asia/Shanghai
      REDIS_PASSWORD: ${SAGE_REDIS_PASSWORD:-}
    ports:
      - "${SAGE_REDIS_PORT:-30056}:6379"
    volumes:
      - ${SAGE_ROOT}/redis/data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    mem_limit: 512m
    cpus: 0.5

  sage-jaeger:
    image: docker.m.daocloud.io/jaegertracing/jaeger:2.16.0
    container_name: ${SAGE_CONTAINER_PREFIX:-sage}-jaeger
    restart: always
    command:
      - --config
      - /etc/jaeger/config.yaml
    volumes:
      - ${SAGE_DEPLOY_DIR:-..}/images/jaeger/config.yaml:/etc/jaeger/config.yaml:ro
    ports:
      - "${SAGE_JAEGER_OTLP_GRPC_PORT:-4317}:4317"
      - "${SAGE_JAEGER_OTLP_HTTP_PORT:-4318}:4318"
    expose:
      - "16686"
      - "13133"
    mem_limit: 1g
    cpus: 0.5

  sage-prometheus:
    image: docker.m.daocloud.io/prom/prometheus:v3.11.3
    container_name: ${SAGE_CONTAINER_PREFIX:-sage}-prometheus
    restart: always
    user: "0:0"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${SAGE_PROMETHEUS_PORT:-30090}:9090"
    volumes:
      - ${SAGE_DEPLOY_DIR:-..}/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${SAGE_ROOT}/prometheus/data:/prometheus
    depends_on:
      - sage-cadvisor
    mem_limit: 1g
    cpus: 0.5

  sage-grafana:
    image: docker.m.daocloud.io/grafana/grafana-enterprise:13.0.1-security-01
    container_name: ${SAGE_CONTAINER_PREFIX:-sage}-grafana
    restart: always
    user: "0:0"
    environment:
      TZ: Asia/Shanghai
      GF_SECURITY_ADMIN_USER: ${SAGE_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${SAGE_GRAFANA_ADMIN_PASSWORD:-change_this_grafana_password}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/sage-server-observability.json
    ports:
      - "${SAGE_GRAFANA_PORT:-30093}:3000"
    volumes:
      - ${SAGE_DEPLOY_DIR:-..}/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${SAGE_DEPLOY_DIR:-..}/monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - ${SAGE_ROOT}/grafana/data:/var/lib/grafana
    depends_on:
      - sage-prometheus
      - sage-loki
    mem_limit: 1g
    cpus: 0.5

  sage-cadvisor:
    image: ghcr.io/google/cadvisor:0.56.2
    container_name: ${SAGE_CONTAINER_PREFIX:-sage}-cadvisor
    restart: always
    privileged: true
    command:
      - --docker_only=true
      - --housekeeping_interval=10s
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    mem_limit: 512m
    cpus: 0.5

  sage-loki:
    image: docker.m.daocloud.io/grafana/loki:3.7.1
    container_name: ${SAGE_CONTAINER_PREFIX:-sage}-loki
    restart: always
    user: "0:0"
    command:
      - -config.file=/etc/loki/config.yml
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${SAGE_LOKI_PORT:-30091}:3100"
    volumes:
      - ${SAGE_DEPLOY_DIR:-..}/monitoring/loki.yml:/etc/loki/config.yml:ro
      - ${SAGE_ROOT}/loki/data:/loki
    mem_limit: 1g
    cpus: 0.5

  sage-alloy:
    image: docker.m.daocloud.io/grafana/alloy:v1.16.1
    container_name: ${SAGE_CONTAINER_PREFIX:-sage}-alloy
    restart: always
    user: "0:0"
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${SAGE_ALLOY_PORT:-30092}:12345"
    volumes:
      - ${SAGE_DEPLOY_DIR:-..}/monitoring/alloy.alloy:/etc/alloy/config.alloy:ro
      - ${SAGE_ROOT}/alloy/data:/var/lib/alloy/data
      - ${SAGE_ROOT}/sage-server/logs:/var/log/sage-server:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - sage-loki
    mem_limit: 512m
    cpus: 0.5
