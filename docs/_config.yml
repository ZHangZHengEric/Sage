title: "Sage Documentation"
description: "Accurate, task-oriented documentation for the current Sage codebase"
baseurl: "/Sage"
url: "https://zhangzhengeric.github.io"

remote_theme: just-the-docs/just-the-docs

markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-remote-theme

mermaid:
  src: 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs'

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true

nav_order_title: "Navigation"
color_scheme: light

logo: "/assets/logo.png"

footer_content: "Sage documentation for the current repository layout. Source available under the MIT license."

lang: en

heading_anchors: true

enable_copy_code_button: true

sass:
  sass_dir: _sass
  style: compressed

aux_links:
  "GitHub Repository":
    - "//github.com/ZHangZHengEric/Sage"
  "Root README":
    - "//github.com/ZHangZHengEric/Sage/blob/main/README.md"

aux_links_new_tab: true

collections:
  guides:
    permalink: "/:collection/:name/"
    output: true
  api:
    permalink: "/:collection/:name/"
    output: true
  app:
    permalink: "/:collection/:name/"
    output: true

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "guides"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "api"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "app"
    values:
      layout: "default"

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - "*.gemspec"
  - "*.gem"
  - plans/
