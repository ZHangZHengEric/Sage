<!DOCTYPE html>
<html>
<head>
    <title>IM Status Debug</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .status { padding: 10px; margin: 10px 0; }
        .green { background: #d4edda; color: #155724; }
        .red { background: #f8d7da; color: #721c24; }
        .gray { background: #e2e3e5; color: #383d41; }
        .yellow { background: #fff3cd; color: #856404; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; overflow: auto; }
    </style>
</head>
<body>
    <h1>IM 状态调试工具</h1>
    
    <div class="section">
        <h2>当前状态</h2>
        <div id="statusDisplay" class="status gray">
            未测试
        </div>
        <pre id="stateDebug">{}</pre>
    </div>
    
    <div class="section">
        <h2>操作</h2>
        <button onclick="simulateTestSuccess()">模拟测试成功</button>
        <button onclick="simulateTestFail()">模拟测试失败</button>
        <button onclick="simulateConfigChange()">模拟修改配置</button>
        <button onclick="toggleEnable()">切换启用状态</button>
        <button onclick="resetAll()">重置所有</button>
    </div>
    
    <div class="section">
        <h2>日志</h2>
        <pre id="log"></pre>
    </div>

    <script>
        // 模拟 Vue 的响应式状态
        let imTestStatus = {
            dingtalk: { tested: false, passed: false }
        };
        let imEditMode = { dingtalk: false };
        let imFrozenConfig = { dingtalk: null };
        let imConfig = {
            dingtalk: { enabled: false, config: { client_id: '', client_secret: '' } }
        };
        
        function log(msg) {
            const logEl = document.getElementById('log');
            logEl.textContent += new Date().toLocaleTimeString() + ' - ' + msg + '\n';
            console.log(msg);
        }
        
        function updateDisplay() {
            const status = imTestStatus.dingtalk;
            const isEdit = imEditMode.dingtalk;
            const display = document.getElementById('statusDisplay');
            
            log(`updateDisplay called: tested=${status.tested}, passed=${status.passed}, edit=${isEdit}`);
            
            if (status.passed && !isEdit) {
                display.className = 'status green';
                display.textContent = '配置已冻结（测试通过）';
            } else if (isEdit) {
                display.className = 'status yellow';
                display.textContent = '编辑模式';
            } else if (status.tested && !status.passed) {
                display.className = 'status red';
                display.textContent = '测试失败';
            } else {
                display.className = 'status gray';
                display.textContent = '未测试';
            }
            
            document.getElementById('stateDebug').textContent = JSON.stringify({
                imTestStatus,
                imEditMode,
                imFrozenConfig: imFrozenConfig.dingtalk ? '已设置' : 'null',
                imConfig
            }, null, 2);
        }
        
        function simulateTestSuccess() {
            log('=== 模拟测试成功 ===');
            
            // 模拟原来的代码方式（直接赋值）
            imTestStatus.dingtalk = { tested: true, passed: true };
            log(`直接赋值后: ${JSON.stringify(imTestStatus.dingtalk)}`);
            
            imFrozenConfig.dingtalk = { client_id: 'test', client_secret: 'test' };
            imEditMode.dingtalk = false;
            
            updateDisplay();
        }
        
        function simulateTestFail() {
            log('=== 模拟测试失败 ===');
            
            // 模拟原来的代码方式（直接赋值）
            imTestStatus.dingtalk = { tested: true, passed: false };
            log(`直接赋值后: ${JSON.stringify(imTestStatus.dingtalk)}`);
            
            updateDisplay();
        }
        
        function simulateConfigChange() {
            log('=== 模拟修改配置 ===');
            imEditMode.dingtalk = true;
            imTestStatus.dingtalk = { tested: false, passed: false };
            updateDisplay();
        }
        
        function toggleEnable() {
            log('=== 切换启用 ===');
            const status = imTestStatus.dingtalk;
            
            if (!status.passed) {
                log('❌ 不能启用: 测试未通过');
                alert('不能启用: 测试未通过');
                return;
            }
            
            imConfig.dingtalk.enabled = !imConfig.dingtalk.enabled;
            log(`✅ 启用状态: ${imConfig.dingtalk.enabled}`);
            updateDisplay();
        }
        
        function resetAll() {
            log('=== 重置 ===');
            imTestStatus = { dingtalk: { tested: false, passed: false } };
            imEditMode = { dingtalk: false };
            imFrozenConfig = { dingtalk: null };
            imConfig = { dingtalk: { enabled: false, config: {} } };
            updateDisplay();
        }
        
        // 初始显示
        updateDisplay();
    </script>
</body>
</html>
